<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f6f7f8" />
    <meta name="app-version" content="2026.07.16-hybrid-2" />
    <title>買い物言い訳ツール</title>
    <link rel="stylesheet" href="style.css?v=20260716-hybrid-2" />
  </head>
  <body>
    <main class="page">
      <section class="card" aria-labelledby="app-title">
        <p class="eyebrow">くだらないけど、一瞬だけ納得</p>
        <h1 id="app-title">買い物言い訳ツール</h1>
        <p class="description">
          買った物と金額を入力すると、もっともらしい言い訳を考えます。
        </p>
        <p class="input-note">
          商品名には、個人名や住所などの個人情報を入力しないでください。
        </p>

        <form id="excuse-form" class="form" novalidate>
          <div class="field">
            <label for="item-name">商品名</label>
            <input
              id="item-name"
              name="itemName"
              type="text"
              inputmode="text"
              placeholder="スニーカー"
              autocomplete="off"
            />
            <p id="item-error" class="error" aria-live="polite"></p>
          </div>

          <div class="field">
            <label for="amount">金額</label>
            <div class="amount-input">
              <input
                id="amount"
                name="amount"
                type="number"
                inputmode="numeric"
                placeholder="30000"
                min="1"
                step="1"
                enterkeyhint="done"
              />
              <span class="unit" aria-hidden="true">円</span>
            </div>
            <p id="amount-error" class="error" aria-live="polite"></p>
          </div>

          <button id="generate-button" class="primary-button" type="submit">
            言い訳を考える
          </button>
          <p id="generation-status" class="generation-status hidden" aria-live="polite"></p>
        </form>

        <section
          id="generation-error"
          class="message message-error hidden"
          aria-live="polite"
          aria-label="入力エラー"
        >
          <p id="generation-error-text" class="message-text"></p>
        </section>

        <section
          id="result-section"
          class="result hidden"
          aria-live="polite"
          aria-label="言い訳の結果"
        >
          <div class="result-header">
            <h2>今回の言い訳</h2>
            <span id="copy-status" class="copy-status" role="status" aria-live="polite"></span>
          </div>
          <p id="result-meta" class="result-meta hidden"></p>
          <p id="result-text" class="result-text"></p>
          <div class="result-actions">
            <button id="regenerate-button" class="secondary-button" type="button">
              別の言い訳を考える
            </button>
            <button id="copy-button" class="secondary-button" type="button">
              コピーする
            </button>
          </div>
        </section>

        <p class="version">version <span id="app-version-text">2026.07.16-hybrid-2</span></p>
      </section>
    </main>

    <script src="script.js?v=20260716-hybrid-2"></script>
  </body>
</html>
